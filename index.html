<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>明洪武年間藩國朝貢圖</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main id="map-container" aria-label="明洪武年間藩國朝貢靜態地圖">
      <aside id="filter-panel" class="filter-panel" aria-label="多維度篩選面板">
        <div class="filter-inner">
          <div class="filter-header">
            <span class="filter-title">篩選條件</span>
            <div class="filter-actions">
              <button class="filter-collapse-btn" type="button" onclick="togglePanel()">收起</button>
              <button class="filter-clear" type="button" onclick="clearAllFilters()">清除全部</button>
            </div>
          </div>

          <div class="filter-section">
            <div class="section-label time-section-label">
              <span>時間</span>
              <span id="time-gregorian-label" class="time-gregorian-label" aria-live="polite"></span>
            </div>
            <div class="picker-row">
              <div class="picker-box">
                <button class="picker-btn" id="yr-btn" type="button" onclick="toggleDrop('yr')">
                  <span id="yr-label">選擇年份</span>
                  <span class="picker-arrow">▼</span>
                </button>
                <div class="picker-drop" id="yr-drop">
                  <div class="drop-header">
                    <span>洪武年份（可多選）</span>
                    <button type="button" onclick="selectAllYears()">全選</button>
                  </div>
                  <div class="yr-grid" id="yr-grid"></div>
                </div>
              </div>
              <div class="picker-box">
                <button class="picker-btn" id="mo-btn" type="button" onclick="toggleDrop('mo')">
                  <span id="mo-label">選擇月份</span>
                  <span class="picker-arrow">▼</span>
                </button>
                <div class="picker-drop" id="mo-drop">
                  <div class="drop-header">
                    <span>月份（可多選）</span>
                    <button type="button" onclick="selectAllMonths()">全選</button>
                  </div>
                  <div class="mo-grid" id="mo-grid"></div>
                </div>
              </div>
            </div>
            <div class="filter-note">不選=全部 · 可多選組合</div>
          </div>

          <hr class="filter-divider">

          <div class="filter-section">
            <button class="section-label section-trigger" type="button" onclick="toggleFilterSection('countries')">
              <span>藩國 <span class="filter-badge" id="badge-countries"></span></span>
              <span class="section-chevron open" id="chev-countries">▼</span>
            </button>
            <div id="sec-countries">
              <div class="filter-region-label">東北亞</div>
              <div class="pill-group" id="pills-northeast"></div>
              <div class="filter-region-label">琉球</div>
              <div class="pill-group" id="pills-ryukyu"></div>
              <div class="filter-region-label">東南亞大陸</div>
              <div class="pill-group" id="pills-sea-mainland"></div>
              <div class="filter-region-label">東南亞海島及其他</div>
              <div class="pill-group" id="pills-sea-island"></div>
            </div>
          </div>

          <hr class="filter-divider">

          <div class="filter-section">
            <button class="section-label section-trigger" type="button" onclick="toggleFilterSection('tribute')">
              <span>貢物類別 <span class="filter-badge" id="badge-tribute"></span></span>
              <span class="section-chevron open" id="chev-tribute">▼</span>
            </button>
            <div id="sec-tribute">
              <div class="pill-group" id="pills-tribute"></div>
              <div class="filter-note">篩選用概括分類 · 點擊路線圖標查看原始明細</div>
            </div>
          </div>

          <hr class="filter-divider">

          <div class="filter-section">
            <button class="section-label section-trigger" type="button" onclick="toggleFilterSection('gifts')">
              <span>給賜類別 <span class="filter-badge" id="badge-gifts"></span></span>
              <span class="section-chevron" id="chev-gifts">▼</span>
            </button>
            <div id="sec-gifts" hidden>
              <div class="pill-group" id="pills-gifts"></div>
            </div>
          </div>

          <hr class="filter-divider">

          <div class="filter-section">
            <button class="section-label section-trigger" type="button" onclick="toggleFilterSection('purpose')">
              <span>朝貢目的 <span class="filter-badge" id="badge-purpose"></span></span>
              <span class="section-chevron" id="chev-purpose">▼</span>
            </button>
            <div id="sec-purpose" hidden>
              <div class="pill-group" id="pills-purpose"></div>
              <div class="filter-note">部分記錄未標註目的 · 不勾選=顯示全部</div>
            </div>
          </div>

          <div class="filter-apply-bar" aria-label="套用篩選">
            <div class="filter-apply-readout">
              <span id="filter-apply-state">尚未套用新選項</span>
              <strong id="draft-result-count">290 條 · 24 國</strong>
            </div>
            <button id="filter-apply-btn" class="filter-apply-btn" type="button" onclick="applyFilters()">應用篩選</button>
          </div>
        </div>
      </aside>
      <button id="filter-toggle" class="filter-toggle" type="button" onclick="togglePanel()" aria-label="折疊篩選面板">◀</button>
      <div id="result-bar" class="result-bar" aria-live="polite">
        <span>篩選：<span class="result-num" id="result-count">290</span> 條 · <span class="result-num" id="result-nations">20</span> 國</span>
        <span class="result-tags" id="result-tags"></span>
      </div>
      <canvas id="base-canvas" aria-hidden="true"></canvas>
      <canvas id="route-canvas" aria-hidden="true"></canvas>
      <canvas id="anim-canvas" aria-hidden="true"></canvas>
      <div id="hit-layer" aria-label="藩國點擊熱區"></div>
      <div id="label-layer" aria-label="藩國位置標籤"></div>
      <section id="ui-layer" aria-label="地圖標題">
        <div class="title-block">
          <p class="era-mark">洪武二年至三十一年 · 1369-1398</p>
          <h1>明洪武年間藩國朝貢圖</h1>
          <p class="phase-note">打磨合規 · Phase 6</p>
        </div>
        <div class="map-legend" aria-label="圖例">
          <span><i class="legend-dot country-dot"></i>藩國位置</span>
          <span><i class="legend-dot capital-dot"></i>應天府</span>
        </div>
      </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/geodata.js"></script>
    <script src="js/baseMap.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/routeRenderer.js"></script>
    <script src="js/hitLayer.js"></script>
    <script src="js/caravanAnim.js"></script>
    <script src="js/bindEvents.js"></script>
    <script src="js/filterPanel.js"></script>
  </body>
</html>
