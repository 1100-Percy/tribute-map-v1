<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>地理分佈圖譜</title>
    <style>
      :root {
        --paper: #f5f0e8;
        --ink: #1a1008;
        --ink-soft: rgba(26, 16, 8, 0.68);
        --line: rgba(139, 128, 112, 0.28);
        --muted: #8b8070;
        --vermillion: #c0392b;
        --gold: #8b6914;
        --shadow: rgba(58, 43, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139, 128, 112, 0.02) 2px, rgba(139, 128, 112, 0.02) 4px),
          radial-gradient(ellipse at 52% 18%, #fff8ed 0%, var(--paper) 58%, #e6ddcc 100%);
        color: var(--ink);
        font-family: "Noto Serif TC", "Noto Serif SC", "Source Han Serif TC", "Songti TC", serif;
      }

      .page {
        width: min(900px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 56px;
      }

      .top-nav {
        margin-bottom: 18px;
      }

      .back-link {
        color: var(--gold);
        font-size: var(--fs-14, 14px);
        text-decoration: none;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--vermillion);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 6px;
        color: var(--ink);
        font-size: clamp(var(--fs-30, 30px), 5vw, var(--fs-46, 46px));
        line-height: 1.1;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 760px;
        margin-bottom: 24px;
        color: var(--ink-soft);
        font-size: var(--fs-15, 15px);
        line-height: 1.8;
      }

      .section {
        margin-top: 22px;
        padding: 20px;
        border: 1px solid var(--line);
        background: rgba(245, 240, 232, 0.72);
        box-shadow: 0 18px 42px var(--shadow);
      }

      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      h2 {
        margin-bottom: 0;
        color: var(--ink);
        font-size: var(--fs-21, 21px);
        line-height: 1.25;
      }

      .note {
        color: var(--muted);
        font-size: var(--fs-13, 13px);
      }

      .map-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 178px;
        gap: 16px;
        align-items: stretch;
      }

      .map-frame {
        position: relative;
        height: 500px;
        min-height: 500px;
        overflow: hidden;
        border: 1px solid rgba(139, 128, 112, 0.2);
        background:
          repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139, 128, 112, 0.018) 2px, rgba(139, 128, 112, 0.018) 4px),
          #f5f0e8;
      }

      #base-canvas,
      #geo-overlay-canvas,
      #label-layer,
      #hit-layer {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }

      #base-canvas {
        z-index: 1;
      }

      #geo-overlay-canvas {
        z-index: 3;
        pointer-events: none;
      }

      #label-layer,
      #hit-layer {
        display: none !important;
        pointer-events: none;
      }

      .geo-side {
        padding: 14px 12px;
        border: 1px solid rgba(139, 128, 112, 0.22);
        background: rgba(255, 250, 242, 0.34);
      }

      .year-control {
        margin-bottom: 18px;
      }

      .year-control label {
        display: block;
        margin-bottom: 8px;
        color: var(--ink);
        font-size: var(--fs-14, 14px);
        font-weight: 700;
      }

      .year-control output {
        display: block;
        margin-top: 6px;
        color: var(--vermillion);
        font-size: var(--fs-13, 13px);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--vermillion);
      }

      .legend {
        display: grid;
        gap: 9px;
        color: rgba(26, 16, 8, 0.72);
        font-size: var(--fs-13, 13px);
      }

      .legend-item {
        display: grid;
        grid-template-columns: 13px minmax(0, 1fr);
        gap: 7px;
        align-items: center;
      }

      .swatch {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--region-color);
      }

      .size-note {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(139, 128, 112, 0.22);
        color: var(--muted);
        font-size: var(--fs-12, 12px);
        line-height: 1.55;
      }

      #scatter-canvas {
        display: block;
        width: 560px;
        max-width: 100%;
        height: 320px;
        margin: 0 auto;
        border: 1px solid rgba(139, 128, 112, 0.18);
        background: rgba(255, 250, 242, 0.34);
      }

      @media (max-width: 760px) {
        .page {
          width: min(100vw - 20px, 900px);
          padding-top: 20px;
        }

        .section {
          padding: 14px 12px;
        }

        .section-head {
          display: block;
        }

        .map-layout {
          grid-template-columns: 1fr;
        }

        .geo-side {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <nav class="top-nav" aria-label="頁面導航">
        <a class="back-link" href="../map.html">← 返回地圖</a>
      </nav>

      <header>
        <h1>地理分佈圖譜</h1>
        <p class="subtitle">以藩國地理位置、區域板塊與到應天府距離為線索，觀察洪武朝朝貢網絡的空間分佈與活躍度差異。</p>
      </header>

      <section class="section" aria-labelledby="map-title">
        <div class="section-head">
          <h2 id="map-title">區域板塊地圖</h2>
          <span class="note">滑動年份觀察各區域朝貢量變化</span>
        </div>
        <div class="map-layout">
          <div id="geo-map-frame" class="map-frame" aria-label="東亞與東南亞區域分佈底圖">
            <canvas id="base-canvas" aria-hidden="true"></canvas>
            <canvas id="geo-overlay-canvas" aria-label="地理區域與朝貢次數疊加圖"></canvas>
            <div id="hit-layer" aria-hidden="true"></div>
            <div id="label-layer" aria-hidden="true"></div>
          </div>
          <aside class="geo-side" aria-label="地圖圖例與時間控制">
            <div class="year-control">
              <label for="year-slider">洪武年份</label>
              <input id="year-slider" type="range" min="2" max="31" value="31" />
              <output id="year-output">洪武31年（1398）</output>
            </div>
            <div class="legend" id="region-legend"></div>
            <p class="size-note">圓點大小 = 該藩國全期朝貢次數平方根 × 1.5；立體柱高 = 該區域當年總朝貢次數。</p>
          </aside>
        </div>
      </section>

      <section class="section" aria-labelledby="scatter-title">
        <div class="section-head">
          <h2 id="scatter-title">距離與活躍度散點圖</h2>
          <span class="note">橫軸：到南京直線距離（km） · 縱軸：總朝貢次數（log）</span>
        </div>
        <canvas id="scatter-canvas" width="560" height="320" aria-label="距離與朝貢活躍度散點圖"></canvas>
      </section>
    </main>

    <script src="../js/fontSizeControls.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/geodata.js"></script>
    <script src="../js/baseMap.js"></script>
    <script>
      (function () {
        "use strict";

        const records = window.TRIBUTE_DATA || [];
        const countries = window.COUNTRIES || {};
        const nanjing = window.NANJING || { lat: 32.06, lng: 118.78 };
        const mapFrame = document.getElementById("geo-map-frame");
        const overlayCanvas = document.getElementById("geo-overlay-canvas");
        const scatterCanvas = document.getElementById("scatter-canvas");
        const slider = document.getElementById("year-slider");
        const yearOutput = document.getElementById("year-output");
        const legend = document.getElementById("region-legend");

        const regionDefs = {
          northeast_asia: {
            label: "東北亞",
            color: "#7F77DD",
            fill: "rgba(127,119,221,0.15)",
            polygon: [
              [119.4, 30.2],
              [129.0, 27.8],
              [142.4, 33.5],
              [141.2, 43.0],
              [129.2, 45.5],
              [120.6, 41.5],
            ],
            labelPoint: [135.3, 38.8],
            pillar: [137.2, 36.4],
          },
          ryukyu: {
            label: "琉球",
            color: "#378ADD",
            fill: "rgba(55,138,221,0.15)",
            polygon: [
              [122.8, 24.2],
              [128.8, 23.4],
              [132.1, 26.7],
              [128.9, 30.0],
              [123.8, 28.5],
            ],
            labelPoint: [128.2, 27.1],
            pillar: [130.8, 26.2],
          },
          southeast_asia_mainland: {
            label: "東南亞大陸",
            color: "#1D9E75",
            fill: "rgba(29,158,117,0.15)",
            polygon: [
              [95.2, 6.0],
              [103.5, 4.5],
              [112.4, 10.8],
              [112.0, 21.6],
              [102.0, 24.6],
              [95.8, 18.4],
            ],
            labelPoint: [104.5, 16.7],
            pillar: [99.2, 20.2],
          },
          southeast_asia_maritime: {
            label: "東南亞海島",
            color: "#EF9F27",
            fill: "rgba(239,159,39,0.15)",
            polygon: [
              [91.6, -8.8],
              [122.6, -9.8],
              [127.0, 2.8],
              [116.2, 8.3],
              [101.0, 6.2],
              [92.2, 0.2],
            ],
            labelPoint: [109.2, -3.0],
            pillar: [121.4, 1.8],
          },
          other: {
            label: "其他遠域",
            color: "#8B6914",
            fill: "rgba(139,105,20,0.10)",
            center: [88.0, 13.0],
            radius: [13.0, 13.0],
            pillar: [93.0, 21.0],
          },
        };
        const visibleRegionKeys = ["northeast_asia", "ryukyu", "southeast_asia_mainland", "southeast_asia_maritime"];
        let currentMapSize = { width: 0, height: 0 };

        function normalizeRegion(countryId) {
          const country = countries[countryId] || {};
          const region = country.region;
          if (countryId.startsWith("ryukyu_") || region === "ryukyu") return "ryukyu";
          if (["goryeo", "joseon", "japan"].includes(countryId) || region === "korea" || region === "east_asia" || region === "northeast_asia") return "northeast_asia";
          if (region === "southeast_asia" || region === "southeast_asia_mainland") return "southeast_asia_mainland";
          if (region === "island_southeast_asia" || region === "southeast_asia_maritime") return "southeast_asia_maritime";
          return "other";
        }

        function setupCanvas(canvas) {
          const dpr = window.devicePixelRatio || 1;
          const rect = canvas.getBoundingClientRect();
          const width = rect.width || canvas.clientWidth || canvas.width;
          const height = rect.height || canvas.clientHeight || canvas.height;
          canvas.width = Math.round(width * dpr);
          canvas.height = Math.round(height * dpr);
          const ctx = canvas.getContext("2d");
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          return { ctx, width, height };
        }

        function fontPx(size) {
          const scale = typeof window.getFontScale === "function" ? window.getFontScale() : 1;
          return Math.round(size * scale * 10) / 10;
        }

        function setupMapOverlayCanvas() {
          const dpr = window.devicePixelRatio || 1;
          const rect = mapFrame.getBoundingClientRect();
          const width = rect.width || mapFrame.clientWidth || 1;
          const height = rect.height || mapFrame.clientHeight || 500;
          overlayCanvas.style.width = `${width}px`;
          overlayCanvas.style.height = `${height}px`;
          overlayCanvas.width = Math.round(width * dpr);
          overlayCanvas.height = Math.round(height * dpr);
          const ctx = overlayCanvas.getContext("2d");
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          currentMapSize = { width, height };
          return { ctx, width, height };
        }

        function hexToRgba(hex, alpha) {
          const clean = hex.replace("#", "");
          const value = parseInt(clean, 16);
          const r = (value >> 16) & 255;
          const g = (value >> 8) & 255;
          const b = value & 255;
          return `rgba(${r},${g},${b},${alpha})`;
        }

        function project(lng, lat) {
          const bounds = window.MAP_CONFIG.bounds;
          const width = currentMapSize.width || mapFrame.getBoundingClientRect().width || overlayCanvas.clientWidth || 1;
          const height = currentMapSize.height || mapFrame.getBoundingClientRect().height || overlayCanvas.clientHeight || 500;
          return {
            x: ((lng - bounds.lngMin) / (bounds.lngMax - bounds.lngMin)) * width,
            y: ((bounds.latMax - lat) / (bounds.latMax - bounds.latMin)) * height,
          };
        }

        function recordsForYear(year) {
          return records.filter((record) => record.year === year);
        }

        function countByCountry(sourceRecords) {
          const counts = new Map();
          sourceRecords.forEach((record) => counts.set(record.countryId, (counts.get(record.countryId) || 0) + 1));
          return counts;
        }

        function countByRegion(sourceRecords) {
          const counts = new Map(Object.keys(regionDefs).map((key) => [key, 0]));
          sourceRecords.forEach((record) => {
            const key = normalizeRegion(record.countryId);
            counts.set(key, (counts.get(key) || 0) + 1);
          });
          return counts;
        }

        function getMaxRegionYearCount() {
          let max = 1;
          for (let year = 2; year <= 31; year++) {
            const counts = countByRegion(recordsForYear(year));
            visibleRegionKeys.forEach((key) => {
              max = Math.max(max, counts.get(key) || 0);
            });
          }
          return max;
        }

        function drawRoundRect(ctx, x, y, width, height, radius) {
          const r = Math.min(radius, width / 2, height / 2);
          if (typeof ctx.roundRect === "function") {
            ctx.roundRect(x, y, width, height, r);
            return;
          }
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + width - r, y);
          ctx.quadraticCurveTo(x + width, y, x + width, y + r);
          ctx.lineTo(x + width, y + height - r);
          ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
          ctx.lineTo(x + r, y + height);
          ctx.quadraticCurveTo(x, y + height, x, y + height - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
        }


        function drawRegionBlob(ctx, def) {
          const points = def.polygon.map(([lng, lat]) => project(lng, lat));
          ctx.save();
          ctx.fillStyle = def.fill;
          ctx.strokeStyle = hexToRgba(def.color, 0.52);
          ctx.setLineDash([7, 5]);
          ctx.lineWidth = 1.4;
          ctx.lineJoin = "round";
          ctx.beginPath();
          points.forEach((point, index) => {
            if (index === 0) ctx.moveTo(point.x, point.y);
            else ctx.lineTo(point.x, point.y);
          });
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          const label = project(def.labelPoint[0], def.labelPoint[1]);
          ctx.setLineDash([]);
          ctx.fillStyle = "rgba(245,240,232,0.78)";
          ctx.strokeStyle = hexToRgba(def.color, 0.36);
          ctx.lineWidth = 0.8;
          const labelFontSize = fontPx(13);
          ctx.font = `bold ${labelFontSize}px "Noto Serif TC", serif`;
          const textW = ctx.measureText(def.label).width + 20;
          const labelH = Math.max(26, labelFontSize + 12);
          ctx.beginPath();
          drawRoundRect(ctx, label.x - textW / 2, label.y - labelH / 2, textW, labelH, 12);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = hexToRgba(def.color, 0.96);
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(def.label, label.x, label.y);
          ctx.restore();
        }

        function drawPillar(ctx, def, value, maxValue) {
          const point = project(def.pillar[0], def.pillar[1]);
          const h = value > 0 ? 10 + (value / maxValue) * 96 : 4;
          const w = 20;
          const d = 9;
          const x = point.x;
          const y = point.y;
          ctx.save();

          ctx.fillStyle = "rgba(58,43,26,0.16)";
          ctx.beginPath();
          ctx.ellipse(x + w / 2 + d / 2, y + 5, w * 0.95, 5, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = hexToRgba(def.color, 0.74);
          ctx.beginPath();
          ctx.rect(x, y - h, w, h);
          ctx.fill();

          ctx.fillStyle = hexToRgba(def.color, 0.46);
          ctx.beginPath();
          ctx.moveTo(x + w, y - h);
          ctx.lineTo(x + w + d, y - h - d);
          ctx.lineTo(x + w + d, y - d);
          ctx.lineTo(x + w, y);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = hexToRgba(def.color, 0.88);
          ctx.beginPath();
          ctx.moveTo(x, y - h);
          ctx.lineTo(x + d, y - h - d);
          ctx.lineTo(x + w + d, y - h - d);
          ctx.lineTo(x + w, y - h);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = "rgba(26,16,8,0.28)";
          ctx.lineWidth = 0.8;
          ctx.stroke();

          ctx.fillStyle = "#1A1008";
          ctx.font = `bold ${fontPx(12)}px "Noto Serif TC", serif`;
          ctx.textAlign = "center";
          ctx.fillText(`${value}次`, x + w / 2, y - h - d - 9);
          ctx.restore();
        }

        function drawOverlay() {
          const year = Number(slider.value);
          const yearRecords = recordsForYear(year);
          const countryCounts = countByCountry(yearRecords);
          const regionCounts = countByRegion(yearRecords);
          const maxRegion = getMaxRegionYearCount();
          const { ctx, width, height } = setupMapOverlayCanvas();

          ctx.clearRect(0, 0, width, height);
          visibleRegionKeys.forEach((key) => drawRegionBlob(ctx, regionDefs[key]));

          visibleRegionKeys.forEach((key) => {
            const def = regionDefs[key];
            drawPillar(ctx, def, regionCounts.get(key) || 0, maxRegion);
          });

          Object.values(countries).forEach((country) => {
            if (!country || typeof country.lng !== "number" || typeof country.lat !== "number") return;
            const count = countryCounts.get(country.id) || 0;
            const total = country.totalRecords || records.filter((record) => record.countryId === country.id).length;
            const radius = Math.max(2.5, Math.sqrt(total) * 1.5);
            const point = project(country.lng, country.lat);
            const region = regionDefs[normalizeRegion(country.id)] || regionDefs.other;
            ctx.save();
            ctx.globalAlpha = count > 0 ? 0.88 : 0.3;
            ctx.fillStyle = region.color;
            ctx.beginPath();
            ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "rgba(245,240,232,0.9)";
            ctx.lineWidth = 1;
            ctx.stroke();
            if (count > 0) {
              ctx.strokeStyle = "rgba(192,57,43,0.62)";
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(point.x, point.y, radius + 4, 0, Math.PI * 2);
              ctx.stroke();
              ctx.fillStyle = "#1A1008";
              ctx.font = `${fontPx(11)}px "Noto Serif TC", serif`;
              ctx.fillText(country.name || country.id, point.x + radius + 4, point.y - 2);
            }
            ctx.restore();
          });

          yearOutput.textContent = `洪武${year}年（${year + 1367}）· ${yearRecords.length}條記錄`;
        }

        function haversineKm(a, b) {
          const toRad = (deg) => (deg * Math.PI) / 180;
          const earth = 6371;
          const dLat = toRad(b.lat - a.lat);
          const dLng = toRad(b.lng - a.lng);
          const lat1 = toRad(a.lat);
          const lat2 = toRad(b.lat);
          const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
          return 2 * earth * Math.asin(Math.sqrt(h));
        }

        function boxesOverlap(a, b) {
          return !(a.x + a.width < b.x || b.x + b.width < a.x || a.y + a.height < b.y || b.y + b.height < a.y);
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function makeLabelBox(ctx, text, anchorX, anchorY, dx, dy, plotBox) {
          const width = ctx.measureText(text).width + 8;
          const height = Math.max(15, fontPx(10) + 6);
          const x = clamp(anchorX + dx, plotBox.left + 3, plotBox.right - width - 3);
          const y = clamp(anchorY + dy - height + 4, plotBox.top + 3, plotBox.bottom - height - 3);
          return { x, y, width, height, textX: x + 4, textY: y + height - 4 };
        }

        function drawScatterLabel(ctx, text, anchorX, anchorY, box, color) {
          ctx.save();
          ctx.strokeStyle = "rgba(139,128,112,0.26)";
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(anchorX, anchorY);
          ctx.lineTo(box.textX, box.textY - 5);
          ctx.stroke();

          ctx.fillStyle = "rgba(245,240,232,0.72)";
          ctx.beginPath();
          drawRoundRect(ctx, box.x, box.y, box.width, box.height, 6);
          ctx.fill();
          ctx.fillStyle = color;
          ctx.textAlign = "left";
          ctx.fillText(text, box.textX, box.textY);
          ctx.restore();
        }

        function drawScatter() {
          const { ctx, width, height } = setupCanvas(scatterCanvas);
          const padding = { top: 26, right: 28, bottom: 54, left: 58 };
          const plotW = width - padding.left - padding.right;
          const plotH = height - padding.top - padding.bottom;
          const points = Object.values(countries)
            .filter((country) => typeof country.lat === "number" && typeof country.lng === "number")
            .map((country) => ({
              country,
              distance: haversineKm(nanjing, country),
              total: country.totalRecords || records.filter((record) => record.countryId === country.id).length,
              region: regionDefs[normalizeRegion(country.id)] || regionDefs.other,
            }));
          const maxDistance = Math.max(...points.map((point) => point.distance), 1);
          const maxLog = Math.max(...points.map((point) => Math.log10(point.total + 1)), 1);
          const plotBox = {
            left: padding.left,
            top: padding.top,
            right: padding.left + plotW,
            bottom: padding.top + plotH,
          };

          ctx.clearRect(0, 0, width, height);
          ctx.strokeStyle = "rgba(139,128,112,0.3)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(padding.left, padding.top);
          ctx.lineTo(padding.left, padding.top + plotH);
          ctx.lineTo(padding.left + plotW, padding.top + plotH);
          ctx.stroke();

          ctx.fillStyle = "#1A1008";
          ctx.font = `${fontPx(12)}px "Noto Serif TC", serif`;
          ctx.textAlign = "center";
          ctx.fillText("距南京直線距離（km）", padding.left + plotW / 2, height - 16);
          ctx.save();
          ctx.translate(18, padding.top + plotH / 2);
          ctx.rotate(-Math.PI / 2);
          ctx.fillText("總朝貢次數（log）", 0, 0);
          ctx.restore();

          [0, 1000, 3000, 5000].forEach((tick) => {
            const x = padding.left + (tick / maxDistance) * plotW;
            if (x > padding.left + plotW) return;
            ctx.fillStyle = "rgba(26,16,8,0.52)";
            ctx.textAlign = "center";
            ctx.fillText(String(tick), x, padding.top + plotH + 18);
            ctx.strokeStyle = "rgba(139,128,112,0.12)";
            ctx.beginPath();
            ctx.moveTo(x, padding.top);
            ctx.lineTo(x, padding.top + plotH);
            ctx.stroke();
          });

          [1, 10, 30, 65].forEach((tick) => {
            const y = padding.top + plotH - (Math.log10(tick + 1) / maxLog) * plotH;
            ctx.fillStyle = "rgba(26,16,8,0.52)";
            ctx.textAlign = "right";
            ctx.fillText(String(tick), padding.left - 8, y + 4);
            ctx.strokeStyle = "rgba(139,128,112,0.12)";
            ctx.beginPath();
            ctx.moveTo(padding.left, y);
            ctx.lineTo(padding.left + plotW, y);
            ctx.stroke();
          });

          const plotted = points.map((point) => ({
            ...point,
            x: padding.left + (point.distance / maxDistance) * plotW,
            y: padding.top + plotH - (Math.log10(point.total + 1) / maxLog) * plotH,
          }));

          plotted.forEach((point) => {
            ctx.fillStyle = point.region.color;
            ctx.globalAlpha = 0.82;
            ctx.beginPath();
            ctx.arc(point.x, point.y, 4.5 + Math.sqrt(point.total) * 0.6, 0, Math.PI * 2);
            ctx.fill();
          });

          const annotationBoxes = [
            { text: "高麗：近 + 頻繁", x: padding.left + 86, y: padding.top + 25 },
            { text: "爪哇：遠但穩定", x: padding.left + plotW * 0.58, y: padding.top + plotH * 0.5 },
            { text: "一次性藩國集中區", x: padding.left + plotW * 0.64, y: padding.top + plotH - 16 },
          ].map((item) => ({
            ...item,
            width: ctx.measureText(item.text).width + 8,
            height: 17,
          }));

          const labelBoxes = annotationBoxes.map((item) => ({ x: item.x - 4, y: item.y - 13, width: item.width, height: item.height }));
          const candidates = [
            [8, -5],
            [8, 16],
            [8, -24],
            [-58, -5],
            [-58, 16],
            [-58, -24],
            [18, 32],
            [-72, 32],
            [18, -40],
            [-72, -40],
          ];

          ctx.globalAlpha = 1;
          ctx.font = `${fontPx(10)}px "Noto Serif TC", serif`;
          plotted
            .slice()
            .sort((a, b) => b.total - a.total)
            .forEach((point) => {
              const text = point.country.name || point.country.id;
              let selectedBox = null;
              for (const [dx, dy] of candidates) {
                const box = makeLabelBox(ctx, text, point.x, point.y, dx, dy, plotBox);
                if (!labelBoxes.some((existing) => boxesOverlap(box, existing))) {
                  selectedBox = box;
                  break;
                }
              }
              if (!selectedBox && point.total >= 5) {
                selectedBox = makeLabelBox(ctx, text, point.x, point.y, 10, 38, plotBox);
              }
              if (!selectedBox) return;
              labelBoxes.push(selectedBox);
              drawScatterLabel(ctx, text, point.x, point.y, selectedBox, "rgba(26,16,8,0.76)");
            });

          ctx.fillStyle = "rgba(192,57,43,0.82)";
          ctx.font = `${fontPx(12)}px "Noto Serif TC", serif`;
          ctx.textAlign = "left";
          annotationBoxes.forEach((item) => {
            ctx.fillText(item.text, item.x, item.y);
          });
        }

        function renderLegend() {
          legend.innerHTML = Object.entries(regionDefs)
            .filter(([key]) => visibleRegionKeys.includes(key))
            .map(([, def]) => `<span class="legend-item"><i class="swatch" style="--region-color:${def.color}"></i>${def.label}</span>`)
            .join("");
        }

        function renderAll() {
          if (typeof window.renderBaseMap === "function") {
            window.renderBaseMap();
          }
          drawOverlay();
          drawScatter();
        }

        renderLegend();
        slider.addEventListener("input", drawOverlay);
        window.addEventListener("resize", () => window.setTimeout(renderAll, 120));
        window.addEventListener("fontSizeChange", renderAll);
        window.addEventListener("DOMContentLoaded", renderAll);
        if (document.readyState !== "loading") renderAll();
      })();
    </script>
  </body>
</html>
