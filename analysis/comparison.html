<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>時段對比分析</title>
    <style>
      :root {
        --paper: #f5f0e8;
        --paper-deep: #e8dfcf;
        --ink: #1a1008;
        --ink-soft: rgba(26, 16, 8, 0.68);
        --line: rgba(139, 128, 112, 0.3);
        --muted: #8b8070;
        --gold: #8b6914;
        --vermillion: #c0392b;
        --green: #2f7d50;
        --shadow: rgba(58, 43, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139, 128, 112, 0.024) 2px, rgba(139, 128, 112, 0.024) 4px),
          radial-gradient(ellipse at 54% 12%, #fff8ed 0%, var(--paper) 56%, var(--paper-deep) 100%);
        color: var(--ink);
        font-family: "Noto Serif TC", "Noto Serif SC", "Source Han Serif TC", "Songti TC", serif;
      }

      .page {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 58px;
      }

      .top-nav {
        margin-bottom: 18px;
      }

      .back-link {
        color: var(--gold);
        font-size: 14px;
        text-decoration: none;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--vermillion);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 8px;
        color: var(--ink);
        font-size: clamp(30px, 5vw, 46px);
        line-height: 1.1;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 820px;
        margin-bottom: 24px;
        color: var(--ink-soft);
        font-size: 15px;
        line-height: 1.8;
      }

      .section {
        margin-top: 22px;
        padding: 20px;
        border: 1px solid var(--line);
        background: rgba(245, 240, 232, 0.78);
        box-shadow: 0 18px 42px var(--shadow);
      }

      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h2 {
        margin-bottom: 0;
        color: var(--ink);
        font-size: 21px;
        line-height: 1.25;
      }

      .note {
        color: var(--muted);
        font-size: 13px;
      }

      .period-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .period-picker {
        padding: 16px;
        border: 1px solid rgba(139, 128, 112, 0.24);
        background: rgba(255, 250, 242, 0.38);
      }

      .period-picker h3 {
        margin-bottom: 6px;
        font-size: 17px;
        line-height: 1.3;
      }

      .period-display {
        margin-bottom: 14px;
        color: var(--vermillion);
        font-size: 14px;
        font-weight: 700;
      }

      .range-row {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr) 42px;
        align-items: center;
        gap: 12px;
        margin: 10px 0;
        color: rgba(26, 16, 8, 0.76);
        font-size: 13px;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--vermillion);
      }

      .range-value {
        color: var(--ink);
        font-weight: 700;
        text-align: right;
      }

      .metric-chart-wrap {
        display: grid;
        gap: 12px;
      }

      .chart-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        color: rgba(26, 16, 8, 0.72);
        font-size: 13px;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .legend-swatch {
        width: 13px;
        height: 13px;
        background: var(--color);
      }

      .metric-bar-canvas {
        display: block;
        width: 100%;
        height: 460px;
        border: 1px solid rgba(139, 128, 112, 0.18);
        background: rgba(255, 250, 242, 0.34);
      }

      .region-canvas {
        display: block;
        width: 100%;
        height: 172px;
        border: 1px solid rgba(139, 128, 112, 0.18);
        background: rgba(255, 250, 242, 0.34);
      }

      @media (max-width: 820px) {
        .period-grid {
          grid-template-columns: 1fr;
        }

        .metric-bar-canvas {
          height: 560px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <nav class="top-nav"><a class="back-link" href="../map.html">返回地圖</a></nav>
      <h1>時段對比分析</h1>
      <p class="subtitle">選擇兩個洪武年段，系統即時重算朝貢頻次、參與範圍、地區結構、貢物類型和使者具名程度，用並列視圖觀察外交網絡的階段性變化。</p>

      <section class="section" aria-label="時段選擇">
        <div class="section-head">
          <h2>選擇對比時段</h2>
          <span class="note">起止年均為洪武紀年，範圍 2-31 年</span>
        </div>
        <div class="period-grid">
          <div class="period-picker" data-period="a">
            <h3>時段 A</h3>
            <div id="period-a-display" class="period-display">洪武2年—洪武6年</div>
            <label class="range-row">
              <span>起始年</span>
              <input id="a-start" type="range" min="2" max="31" value="2" />
              <span id="a-start-value" class="range-value">2</span>
            </label>
            <label class="range-row">
              <span>結束年</span>
              <input id="a-end" type="range" min="2" max="31" value="6" />
              <span id="a-end-value" class="range-value">6</span>
            </label>
          </div>
          <div class="period-picker" data-period="b">
            <h3>時段 B</h3>
            <div id="period-b-display" class="period-display">洪武7年—洪武13年</div>
            <label class="range-row">
              <span>起始年</span>
              <input id="b-start" type="range" min="2" max="31" value="7" />
              <span id="b-start-value" class="range-value">7</span>
            </label>
            <label class="range-row">
              <span>結束年</span>
              <input id="b-end" type="range" min="2" max="31" value="13" />
              <span id="b-end-value" class="range-value">13</span>
            </label>
          </div>
        </div>
      </section>

      <section class="section" aria-label="對比結果">
        <div class="section-head">
          <h2>指標柱狀對比</h2>
          <span id="metric-chart-note" class="note"></span>
        </div>
        <div class="metric-chart-wrap">
          <div class="chart-legend" aria-label="柱狀圖圖例">
            <span class="legend-item"><i class="legend-swatch" style="--color:#2f7d50"></i>時段 A</span>
            <span class="legend-item"><i class="legend-swatch" style="--color:#c0392b"></i>時段 B</span>
          </div>
          <canvas id="metric-bar-canvas" class="metric-bar-canvas"></canvas>
        </div>
      </section>

      <section class="section" aria-label="地區貢獻比例">
        <div class="section-head">
          <h2>各地區貢獻比例</h2>
          <span class="note">按記錄數占比繪製，雙行橫向堆疊</span>
        </div>
        <canvas id="region-canvas" class="region-canvas"></canvas>
      </section>
    </main>

    <script src="../js/data.js"></script>
    <script>
      (function () {
        "use strict";

        const { TRIBUTE_DATA, COUNTRIES } = window;

        const regionMeta = [
          { key: "korea", label: "東北亞", color: "#7752a8" },
          { key: "east_asia", label: "日本/琉球", color: "#2d75a8" },
          { key: "southeast_asia", label: "東南亞大陸", color: "#3d8a5f" },
          { key: "island_southeast_asia", label: "東南亞海島", color: "#d9822b" },
          { key: "indian_ocean", label: "印度洋", color: "#a88745" },
          { key: "far_west", label: "遠西", color: "#8b8070" },
          { key: "unknown", label: "未定", color: "#a9a197" },
        ];

        const state = {
          a: { start: 2, end: 6 },
          b: { start: 7, end: 13 },
        };

        const metricDefs = [
          { key: "totalRecords", label: "總朝貢記錄數", format: formatInteger, axisFormat: formatInteger },
          { key: "countryCount", label: "參與藩國數", format: formatInteger, axisFormat: formatInteger },
          { key: "avgRecordsPerYear", label: "平均每年記錄數", format: formatDecimal, axisFormat: formatDecimal },
          { key: "avgCountriesPerYear", label: "平均每年參與國數", format: formatDecimal, axisFormat: formatDecimal },
          { key: "oneTimeCountryCount", label: "一次性藩國數", format: formatInteger, axisFormat: formatInteger },
          { key: "rejectedTributeCount", label: "卻貢記錄數", format: formatInteger, axisFormat: formatInteger },
          { key: "namedEnvoyRatio", label: "具名使者占總記錄比例", format: formatPercent, axisFormat: formatPercent },
        ];

        function normalizeRange(range) {
          const start = Math.min(Number(range.start), Number(range.end));
          const end = Math.max(Number(range.start), Number(range.end));
          return { start, end };
        }

        function recordsInRange(range) {
          const { start, end } = normalizeRange(range);
          return TRIBUTE_DATA.filter((record) => record.year >= start && record.year <= end);
        }

        function hasNamedEnvoy(record) {
          const value = String(record.envoy || "").trim();
          return value !== "" && value !== "不詳";
        }

        function countBy(list, getter) {
          const map = new Map();
          list.forEach((item) => {
            const key = getter(item);
            map.set(key, (map.get(key) || 0) + 1);
          });
          return map;
        }

        function getCountryRegion(countryId) {
          return COUNTRIES[countryId]?.region || "unknown";
        }

        function computePeriod(range) {
          const normalized = normalizeRange(range);
          const records = recordsInRange(normalized);
          const years = normalized.end - normalized.start + 1;
          const countryRecordCounts = countBy(records, (record) => record.countryId);
          const yearlyCountryCounts = [];

          for (let year = normalized.start; year <= normalized.end; year += 1) {
            yearlyCountryCounts.push(new Set(records.filter((record) => record.year === year).map((record) => record.countryId)).size);
          }

          const regionCounts = new Map(regionMeta.map((region) => [region.key, 0]));
          records.forEach((record) => {
            const region = getCountryRegion(record.countryId);
            regionCounts.set(region, (regionCounts.get(region) || 0) + 1);
          });

          return {
            range: normalized,
            records,
            totalRecords: records.length,
            countryCount: countryRecordCounts.size,
            avgRecordsPerYear: records.length / years,
            avgCountriesPerYear: yearlyCountryCounts.reduce((sum, count) => sum + count, 0) / years,
            oneTimeCountryCount: Array.from(countryRecordCounts.values()).filter((count) => count === 1).length,
            regionCounts,
            rejectedTributeCount: records.filter((record) => String(record.tributeRaw || "").includes("卻貢")).length,
            namedEnvoyRatio: records.length ? records.filter(hasNamedEnvoy).length / records.length : 0,
          };
        }

        function formatInteger(value) {
          return String(Math.round(value));
        }

        function formatDecimal(value) {
          return value.toFixed(1);
        }

        function formatPercent(value) {
          return `${Math.round(value * 100)}%`;
        }

        function rangeLabel(range) {
          const normalized = normalizeRange(range);
          return `洪武${normalized.start}年—洪武${normalized.end}年`;
        }

        function renderControls() {
          ["a", "b"].forEach((key) => {
            const normalized = normalizeRange(state[key]);
            document.getElementById(`${key}-start`).value = String(state[key].start);
            document.getElementById(`${key}-end`).value = String(state[key].end);
            document.getElementById(`${key}-start-value`).textContent = state[key].start;
            document.getElementById(`${key}-end-value`).textContent = state[key].end;
            document.getElementById(`period-${key}-display`).textContent = rangeLabel(normalized);
          });
        }

        function drawMetricBarCanvas(periodA, periodB) {
          const canvas = document.getElementById("metric-bar-canvas");
          const rect = canvas.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.max(1, Math.round(rect.width * dpr));
          canvas.height = Math.max(1, Math.round(rect.height * dpr));
          const ctx = canvas.getContext("2d");
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.clearRect(0, 0, rect.width, rect.height);

          document.getElementById("metric-chart-note").textContent = `${rangeLabel(periodA.range)} 對比 ${rangeLabel(periodB.range)}`;

          const isNarrow = rect.width < 720;
          const chart = {
            left: isNarrow ? 28 : 34,
            right: rect.width - 24,
            top: 34,
            bottom: rect.height - (isNarrow ? 124 : 86),
          };
          const chartWidth = Math.max(1, chart.right - chart.left);
          const chartHeight = Math.max(1, chart.bottom - chart.top);
          const groupWidth = chartWidth / metricDefs.length;
          const barWidth = Math.min(isNarrow ? 18 : 28, groupWidth * 0.24);

          ctx.save();
          ctx.strokeStyle = "rgba(139, 128, 112, 0.42)";
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(chart.left, chart.bottom);
          ctx.lineTo(chart.right, chart.bottom);
          ctx.stroke();

          ctx.font = '12px "Noto Serif TC", "Noto Serif SC", serif';
          ctx.fillStyle = "rgba(26, 16, 8, 0.58)";
          ctx.textAlign = "left";
          ctx.textBaseline = "top";
          ctx.fillText("每組按該指標 A/B 最大值歸一化；柱頂為真實數值", chart.left, chart.top - 24);

          metricDefs.forEach((metric, index) => {
            const center = chart.left + groupWidth * index + groupWidth / 2;
            const aValue = periodA[metric.key];
            const bValue = periodB[metric.key];
            const localMax = Math.max(aValue, bValue, 1);
            const guideLeft = center - Math.max(barWidth * 1.8, groupWidth * 0.24);
            const guideWidth = Math.max(barWidth * 3.6, groupWidth * 0.48);
            ctx.fillStyle = "rgba(139, 128, 112, 0.08)";
            ctx.fillRect(guideLeft, chart.top, guideWidth, chartHeight);
            ctx.strokeStyle = "rgba(139, 128, 112, 0.14)";
            ctx.strokeRect(guideLeft, chart.top, guideWidth, chartHeight);
            drawOneBar(ctx, center - barWidth * 0.62, chart, localMax, barWidth, aValue, "#2f7d50", metric.format);
            drawOneBar(ctx, center + barWidth * 0.62, chart, localMax, barWidth, bValue, "#c0392b", metric.format);

            ctx.save();
            ctx.fillStyle = "rgba(26, 16, 8, 0.74)";
            ctx.font = isNarrow ? '11px "Noto Serif TC", "Noto Serif SC", serif' : '12px "Noto Serif TC", "Noto Serif SC", serif';
            ctx.textAlign = isNarrow ? "right" : "center";
            ctx.textBaseline = "top";
            if (isNarrow) {
              ctx.translate(center - 4, chart.bottom + 12);
              ctx.rotate(-Math.PI / 4);
              ctx.fillText(metric.label, 0, 0);
            } else {
              wrapCanvasText(ctx, metric.label, center, chart.bottom + 12, Math.max(64, groupWidth - 8), 16);
            }
            ctx.restore();
          });
          ctx.restore();
        }

        function drawOneBar(ctx, x, chart, yMax, width, value, color, formatter) {
          const chartHeight = chart.bottom - chart.top;
          const barHeight = yMax ? (value / yMax) * chartHeight : 0;
          const y = chart.bottom - barHeight;
          ctx.fillStyle = color;
          ctx.fillRect(x - width / 2, y, width, barHeight);
          ctx.strokeStyle = "rgba(26, 16, 8, 0.18)";
          ctx.strokeRect(x - width / 2, y, width, barHeight);
          ctx.fillStyle = "rgba(26, 16, 8, 0.82)";
          ctx.font = '12px "Noto Serif TC", "Noto Serif SC", serif';
          ctx.textAlign = "center";
          ctx.textBaseline = "bottom";
          ctx.fillText(formatter(value), x, Math.max(chart.top + 14, y - 5));
        }

        function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
          const chars = Array.from(text);
          let line = "";
          let offset = 0;
          chars.forEach((char, index) => {
            const testLine = line + char;
            if (ctx.measureText(testLine).width > maxWidth && line) {
              ctx.fillText(line, x, y + offset);
              line = char;
              offset += lineHeight;
            } else {
              line = testLine;
            }
            if (index === chars.length - 1 && line) {
              ctx.fillText(line, x, y + offset);
            }
          });
        }

        function drawRegionCanvas(periodA, periodB) {
          const canvas = document.getElementById("region-canvas");
          const rect = canvas.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.max(1, Math.round(rect.width * dpr));
          canvas.height = Math.max(1, Math.round(rect.height * dpr));
          const ctx = canvas.getContext("2d");
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.clearRect(0, 0, rect.width, rect.height);

          const left = 84;
          const right = rect.width - 18;
          const barWidth = Math.max(40, right - left);
          const rows = [
            { label: "時段 A", period: periodA, y: 42 },
            { label: "時段 B", period: periodB, y: 94 },
          ];

          ctx.font = '13px "Noto Serif TC", "Noto Serif SC", serif';
          ctx.textBaseline = "middle";
          rows.forEach((row) => {
            ctx.fillStyle = "rgba(26, 16, 8, 0.72)";
            ctx.fillText(row.label, 14, row.y + 11);
            let x = left;
            regionMeta.forEach((region) => {
              const count = row.period.regionCounts.get(region.key) || 0;
              const width = row.period.totalRecords ? (count / row.period.totalRecords) * barWidth : 0;
              if (width > 0) {
                ctx.fillStyle = region.color;
                ctx.fillRect(x, row.y, width, 22);
              }
              x += width;
            });
            ctx.strokeStyle = "rgba(139, 128, 112, 0.32)";
            ctx.strokeRect(left, row.y, barWidth, 22);
          });

          let legendX = left;
          const legendY = 146;
          regionMeta.forEach((region) => {
            ctx.fillStyle = region.color;
            ctx.fillRect(legendX, legendY - 5, 10, 10);
            ctx.fillStyle = "rgba(26, 16, 8, 0.7)";
            ctx.fillText(region.label, legendX + 14, legendY);
            legendX += ctx.measureText(region.label).width + 36;
          });
        }

        function render() {
          renderControls();
          const periodA = computePeriod(state.a);
          const periodB = computePeriod(state.b);
          drawMetricBarCanvas(periodA, periodB);
          drawRegionCanvas(periodA, periodB);
        }

        function bindControls() {
          ["a", "b"].forEach((key) => {
            ["start", "end"].forEach((edge) => {
              document.getElementById(`${key}-${edge}`).addEventListener("input", (event) => {
                state[key][edge] = Number(event.target.value);
                render();
              });
            });
          });

          window.addEventListener("resize", render);
        }

        bindControls();
        render();
      })();
    </script>
  </body>
</html>
